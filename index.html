<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manga Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" id="app">
        <!-- TOP BAR -->
        <header class="top-bar">
            <div class="top-left">
                <label class="icon-btn" title="Load Image">
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </label>
            </div>
            <div class="top-center">
                <button class="icon-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
                </button>
                <button class="icon-btn" id="redo-btn" title="Redo (Ctrl+Y)" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.64-11.36L23 10"/></svg>
                </button>
                <span class="zoom-display" id="zoom-display">100%</span>
            </div>
            <div class="top-right">
                <button class="icon-btn" id="layer-btn" title="Layers">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                </button>
                <button class="color-btn" id="color-btn" title="Color">
                    <span class="color-btn-swatch" id="color-btn-swatch"></span>
                </button>
                <button class="icon-btn" id="fit-btn" title="Fit to Screen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
                </button>
                <button class="icon-btn export-btn" id="export-btn" title="Export PNG">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </div>
        </header>

        <!-- OPTIONS BAR (tool-specific) -->
        <div class="options-bar" id="options-bar">
            <!-- Select options -->
            <div class="opt-group" id="opt-select" data-tools="select">
                <button class="action-btn" id="sel-erase-btn">Erase</button>
                <button class="action-btn" id="sel-fill-btn">Fill White</button>
                <button class="action-btn secondary" id="sel-cancel-btn">Cancel</button>
            </div>
            <!-- Brush trigger -->
            <div class="opt-group" id="opt-brush" data-tools="brush">
                <button class="brush-trigger" id="brush-trigger">
                    <span class="brush-trigger-swatch" id="brush-trigger-swatch"></span>
                    <span>Brush</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <!-- Eraser options -->
            <div class="opt-group" id="opt-eraser" data-tools="eraser">
                <label class="opt-label">Size</label>
                <input type="range" id="eraser-size" min="1" max="100" value="20">
                <span class="opt-val" id="eraser-size-val">20</span>
            </div>
            <!-- Text options -->
            <div class="opt-group" id="opt-text" data-tools="text">
                <button class="action-btn" id="add-text-btn">+ Add Text</button>
            </div>
            <!-- Eyedropper options -->
            <div class="opt-group" id="opt-eyedropper" data-tools="eyedropper">
                <span class="opt-info">Tap on image to pick color</span>
                <div class="color-preview" id="picked-color-preview"></div>
            </div>
            <!-- Fill options -->
            <div class="opt-group" id="opt-fill" data-tools="fill">
                <input type="color" id="fill-color" value="#ffffff" class="color-pick">
                <label class="opt-label">Tolerance</label>
                <input type="range" id="fill-tolerance" min="0" max="100" value="30">
                <span class="opt-val" id="fill-tolerance-val">30</span>
            </div>
            <!-- Magic Wand options -->
            <div class="opt-group" id="opt-magic-wand" data-tools="magic-wand">
                <label class="opt-label">Tolerance</label>
                <input type="range" id="mw-tolerance" min="0" max="100" value="30">
                <span class="opt-val" id="mw-tolerance-val">30</span>
                <button class="toggle-btn" id="mw-add-mode">New</button>
                <button class="action-btn secondary" id="mw-clear-btn">Clear</button>
            </div>
            <!-- Crop options -->
            <div class="opt-group" id="opt-crop" data-tools="crop">
                <button class="action-btn" id="crop-apply-btn">Apply Crop</button>
                <button class="action-btn secondary" id="crop-cancel-btn">Cancel</button>
            </div>
            <!-- Rotate options -->
            <div class="opt-group" id="opt-rotate" data-tools="rotate">
                <button class="action-btn" id="rotate-ccw-btn">↺ 90°</button>
                <button class="action-btn" id="rotate-cw-btn">↻ 90°</button>
                <button class="action-btn" id="flip-h-btn">Flip H</button>
                <button class="action-btn" id="flip-v-btn">Flip V</button>
            </div>
        </div>

        <!-- BRUSH PANEL (floating popup) -->
        <div class="brush-panel" id="brush-panel">
            <div class="bp-section">
                <canvas id="brush-preview" class="brush-preview" width="80" height="80"></canvas>
            </div>
            <div class="bp-section">
                <div class="bp-row">
                    <label class="bp-label">Size</label>
                    <input type="range" id="brush-size" min="1" max="100" value="12" class="bp-range">
                    <span class="bp-val" id="brush-size-val">12</span>
                </div>
                <div class="bp-row">
                    <label class="bp-label">Hardness</label>
                    <input type="range" id="brush-hardness" min="0" max="100" value="100" class="bp-range">
                    <span class="bp-val" id="brush-hardness-val">100%</span>
                </div>
                <div class="bp-row">
                    <label class="bp-label">Opacity</label>
                    <input type="range" id="brush-opacity" min="1" max="100" value="100" class="bp-range">
                    <span class="bp-val" id="brush-opacity-val">100%</span>
                </div>
                <div class="bp-row">
                    <label class="bp-label">Flow</label>
                    <input type="range" id="brush-flow" min="1" max="100" value="100" class="bp-range">
                    <span class="bp-val" id="brush-flow-val">100%</span>
                </div>
            </div>
        </div>

        <!-- COLOR PANEL -->
        <div class="color-panel" id="color-panel">
            <div class="cp-top">
                <div class="cp-gradient-wrap">
                    <canvas id="cp-gradient" class="cp-gradient" width="200" height="200"></canvas>
                    <div class="cp-crosshair" id="cp-crosshair"></div>
                </div>
                <div class="cp-hue-wrap">
                    <canvas id="cp-hue" class="cp-hue" width="20" height="200"></canvas>
                    <div class="cp-hue-indicator" id="cp-hue-indicator"></div>
                </div>
            </div>
            <div class="cp-tabs">
                <button class="cp-tab active" data-mode="rgb">RGB</button>
                <button class="cp-tab" data-mode="hsl">HSL</button>
            </div>
            <div class="cp-sliders" id="cp-rgb-sliders">
                <div class="cp-slider-row">
                    <label class="cp-slider-label">R</label>
                    <input type="range" id="cp-r" min="0" max="255" value="0" class="cp-slider">
                    <input type="number" id="cp-r-val" class="cp-num" min="0" max="255" value="0">
                </div>
                <div class="cp-slider-row">
                    <label class="cp-slider-label">G</label>
                    <input type="range" id="cp-g" min="0" max="255" value="0" class="cp-slider">
                    <input type="number" id="cp-g-val" class="cp-num" min="0" max="255" value="0">
                </div>
                <div class="cp-slider-row">
                    <label class="cp-slider-label">B</label>
                    <input type="range" id="cp-b" min="0" max="255" value="0" class="cp-slider">
                    <input type="number" id="cp-b-val" class="cp-num" min="0" max="255" value="0">
                </div>
            </div>
            <div class="cp-sliders hidden" id="cp-hsl-sliders">
                <div class="cp-slider-row">
                    <label class="cp-slider-label">H</label>
                    <input type="range" id="cp-h-slider" min="0" max="360" value="0" class="cp-slider">
                    <input type="number" id="cp-h-val" class="cp-num" min="0" max="360" value="0">
                </div>
                <div class="cp-slider-row">
                    <label class="cp-slider-label">S</label>
                    <input type="range" id="cp-s-slider" min="0" max="100" value="100" class="cp-slider">
                    <input type="number" id="cp-s-val" class="cp-num" min="0" max="100" value="100">
                </div>
                <div class="cp-slider-row">
                    <label class="cp-slider-label">L</label>
                    <input type="range" id="cp-l-slider" min="0" max="100" value="50" class="cp-slider">
                    <input type="number" id="cp-l-val" class="cp-num" min="0" max="100" value="50">
                </div>
            </div>
            <div class="cp-hex-row">
                <span class="cp-hash">#</span>
                <input type="text" id="cp-hex" class="cp-hex-input" value="000000" maxlength="6" spellcheck="false">
            </div>
            <div class="cp-section">
                <div class="cp-section-header">
                    <span class="cp-section-title">Palette</span>
                    <button class="cp-add-palette" id="cp-add-palette" title="Add color">+</button>
                </div>
                <div class="cp-palette" id="cp-palette"></div>
            </div>
            <div class="cp-section">
                <span class="cp-section-title">Recent</span>
                <div class="cp-recent" id="cp-recent"></div>
            </div>
            <button class="cp-eyedropper-btn" id="cp-eyedropper" title="Pick from canvas">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42L11 6.41l1.42 1.42L3 17.25V21h3.75l9.42-9.42L17.59 13l1.42-1.42-1.42-1.41 3.12-3.13a1 1 0 000-1.41z"/></svg>
                Pick from canvas
            </button>
        </div>

        <!-- LAYER PANEL -->
        <div class="layer-panel" id="layer-panel">
            <div class="lp-header">
                <select id="lp-blend-mode" class="lp-blend-select">
                    <option value="source-over">Normal</option>
                    <option value="multiply">Multiply</option>
                    <option value="screen">Screen</option>
                    <option value="overlay">Overlay</option>
                    <option value="darken">Darken</option>
                    <option value="lighten">Lighten</option>
                    <option value="difference">Difference</option>
                    <option value="exclusion">Exclusion</option>
                </select>
                <div class="lp-opacity-row">
                    <label class="lp-label">Opacity</label>
                    <input type="range" id="lp-opacity" min="0" max="100" value="100" class="lp-range">
                    <span class="lp-val" id="lp-opacity-val">100%</span>
                </div>
            </div>
            <div class="lp-list" id="lp-list"></div>
            <div class="lp-footer">
                <button class="lp-btn" id="lp-add-btn" title="Add Layer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="lp-btn" id="lp-dup-btn" title="Duplicate Layer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                </button>
                <button class="lp-btn" id="lp-del-btn" title="Delete Layer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
                <button class="lp-btn" id="lp-merge-btn" title="Merge Down">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
                </button>
            </div>
        </div>

        <!-- CANVAS -->
        <main class="canvas-area" id="canvas-area">
            <canvas id="main-canvas"></canvas>
            <!-- Overlay canvas for selection rectangles, crop guides, etc. -->
            <canvas id="overlay-canvas"></canvas>
            <!-- Text canvas (no CSS transform, renders at screen coords) -->
            <canvas id="text-canvas"></canvas>
            <div class="placeholder" id="placeholder">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p>Load an image to start editing</p>
                <p class="sub">Drag & drop or tap the upload button</p>
            </div>
            <div class="drop-zone hidden" id="drop-zone">Drop image here</div>
        </main>

        <!-- TEXT OBJECT TOOLBAR (shown when a text object is selected) -->
        <div class="text-toolbar hidden" id="text-toolbar">
            <div class="tt-group">
                <label class="tt-label">Size</label>
                <button class="tt-btn" id="tt-size-down">−</button>
                <span class="tt-val" id="tt-size-val">24</span>
                <button class="tt-btn" id="tt-size-up">+</button>
            </div>
            <div class="tt-group">
                <input type="color" id="tt-color" value="#000000" class="tt-color-pick">
            </div>
            <div class="tt-group">
                <button class="tt-toggle" id="tt-bold">B</button>
                <button class="tt-toggle" id="tt-italic"><em>I</em></button>
            </div>
            <div class="tt-group">
                <button class="tt-align active" id="tt-align-left" data-align="left">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
                </button>
                <button class="tt-align" id="tt-align-center" data-align="center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
                </button>
                <button class="tt-align" id="tt-align-right" data-align="right">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
            <div class="tt-group">
                <label class="tt-label">Space</label>
                <input type="range" id="tt-line-height" min="10" max="30" value="14" class="tt-range">
            </div>
        </div>

        <!-- BOTTOM TOOLBAR -->
        <nav class="bottom-bar" id="bottom-bar">
            <button class="tool-btn active" data-tool="select">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/></svg>
                <span>Select</span>
            </button>
            <button class="tool-btn" data-tool="brush">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                <span>Brush</span>
            </button>
            <button class="tool-btn" data-tool="eraser">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/><line x1="6" y1="20" x2="20" y2="20"/></svg>
                <span>Eraser</span>
            </button>
            <button class="tool-btn" data-tool="text">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
                <span>Text</span>
            </button>
            <button class="tool-btn" data-tool="eyedropper">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M3 21l9-9"/><circle cx="17.5" cy="6.5" r="3.5"/></svg>
                <span>Picker</span>
            </button>
            <button class="tool-btn" data-tool="fill">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M3 21l9-9"/><path d="M19 11l-8 8"/><path d="M19 7c0 2.5-2 4.5-2 7"/><circle cx="19" cy="5" r="2"/></svg>
                <span>Fill</span>
            </button>
            <button class="tool-btn" data-tool="magic-wand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8L19 13"/><path d="M17.8 6.2L19 5"/><path d="M12.2 11.8L11 13"/><path d="M12.2 6.2L11 5"/><circle cx="15" cy="9" r="3"/><path d="M6 21l3-9 4 5 3-2 4 6"/></svg>
                <span>Wand</span>
            </button>
            <button class="tool-btn" data-tool="crop">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v4H2"/><path d="M18 22v-4h4"/><rect x="6" y="6" width="12" height="12"/></svg>
                <span>Crop</span>
            </button>
            <button class="tool-btn" data-tool="rotate">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
                <span>Rotate</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
